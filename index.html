<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>德语返钱局</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07101c;
      --panel: #0d1927;
      --panel-soft: #122234;
      --panel-warm: #fff8ec;
      --ink: #f7ecd8;
      --muted: #9ca9b8;
      --line: #28394d;
      --gold: #f5b84b;
      --gold-deep: #d58b20;
      --teal: #58c6b4;
      --green: #6fd18c;
      --red: #ef7b73;
      --shadow: 0 24px 70px rgba(0, 0, 0, .36);
      --radius: 8px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --serif: Georgia, "Times New Roman", serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background:
        radial-gradient(circle at 50% 0%, rgba(245, 184, 75, .10), transparent 30rem),
        linear-gradient(145deg, #050b13 0%, var(--bg) 52%, #09131f 100%);
      color: var(--ink);
    }

    button {
      font: inherit;
    }

    .app {
      width: min(1560px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 32px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid rgba(245, 184, 75, .55);
      border-radius: var(--radius);
      color: var(--gold);
      background: linear-gradient(180deg, rgba(245, 184, 75, .14), rgba(245, 184, 75, .04));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .04);
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.15rem);
      letter-spacing: 0;
      white-space: nowrap;
    }

    .tagline {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #d6c5a9;
      font-size: .98rem;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-button {
      display: inline-grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid rgba(245, 184, 75, .45);
      border-radius: var(--radius);
      background: #0b1724;
      color: var(--gold);
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      transform: translateY(-1px);
      border-color: var(--gold);
      outline: none;
      background: #122234;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(280px, 420px) minmax(380px, 1fr) minmax(330px, 470px);
      gap: 22px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(16, 31, 47, .94), rgba(7, 16, 28, .96));
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-pad {
      padding: 22px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .panel-title {
      margin: 0;
      color: var(--gold);
      font-size: 1.28rem;
      letter-spacing: 0;
    }

    .link-button {
      border: 0;
      background: transparent;
      color: #d8cdb9;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: color .18s ease, background .18s ease;
    }

    .link-button:hover,
    .link-button:focus-visible {
      color: var(--gold);
      background: rgba(245, 184, 75, .08);
      outline: none;
    }

    .balance-label {
      color: #d8cdb9;
      margin: 8px 0 12px;
      font-weight: 700;
    }

    .balance-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }

    .balance {
      font-size: clamp(3rem, 7vw, 4.7rem);
      line-height: .95;
      font-weight: 800;
      color: #ffe3aa;
      letter-spacing: 0;
    }

    .currency-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: .95rem;
    }

    .wallet {
      flex: 0 0 auto;
      display: grid;
      width: 48px;
      height: 48px;
      place-items: center;
      border: 1px solid rgba(245, 184, 75, .45);
      border-radius: var(--radius);
      color: var(--gold);
      background: rgba(245, 184, 75, .08);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding: 22px 0;
      border-bottom: 1px solid var(--line);
    }

    .stat {
      padding: 0 18px 0 6px;
    }

    .stat + .stat {
      border-left: 1px solid var(--line);
      padding-left: 28px;
    }

    .stat-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #d8cdb9;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .stat strong {
      display: inline-block;
      font-size: 2.65rem;
      line-height: 1;
      color: #fff4dd;
    }

    .stat span:last-child {
      color: #b9c2cd;
      margin-left: 5px;
    }

    .transactions {
      display: grid;
      gap: 10px;
    }

    .transaction {
      display: grid;
      grid-template-columns: 36px 1fr auto;
      gap: 12px;
      align-items: center;
      min-height: 58px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .025);
    }

    .transaction-icon {
      display: grid;
      width: 36px;
      height: 36px;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      background: #2d8151;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, .16);
    }

    .transaction.spend .transaction-icon {
      background: #875f12;
    }

    .transaction-name {
      min-width: 0;
    }

    .transaction-name strong,
    .transaction-name span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .transaction-name span {
      color: var(--muted);
      font-size: .86rem;
      margin-top: 3px;
    }

    .transaction-amount {
      color: var(--green);
      font-weight: 800;
      white-space: nowrap;
    }

    .transaction.spend .transaction-amount {
      color: #ff9f4d;
    }

    .quiz-panel {
      padding: 20px;
    }

    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .progress-copy {
      color: #d7c6aa;
      font-weight: 700;
      white-space: nowrap;
    }

    .progress-copy strong {
      color: #fff1d7;
      margin-left: 8px;
    }

    .progress-track {
      position: relative;
      height: 7px;
      flex: 1 1 auto;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, .12);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--teal));
      transition: width .25s ease;
    }

    .ghost-button,
    .primary-button {
      min-height: 46px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease, opacity .18s ease;
    }

    .ghost-button {
      border: 1px solid rgba(245, 184, 75, .48);
      background: #0b1724;
      color: #ead7b7;
      padding: 0 18px;
      font-weight: 800;
      white-space: nowrap;
    }

    .ghost-button:hover,
    .ghost-button:focus-visible {
      transform: translateY(-1px);
      border-color: var(--gold);
      outline: none;
      background: #132336;
    }

    .card {
      position: relative;
      padding: 28px 32px 24px;
      border-radius: var(--radius);
      background:
        linear-gradient(140deg, rgba(255, 255, 255, .92), rgba(255, 248, 236, .98)),
        var(--panel-warm);
      color: #101929;
      box-shadow: 0 24px 40px rgba(0, 0, 0, .22);
      min-height: 590px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .level-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 38px;
      border-radius: var(--radius);
      background: #dff0e6;
      color: #2e8b58;
      font-weight: 800;
    }

    .card-id {
      position: absolute;
      top: 34px;
      right: 32px;
      color: #6d7684;
      font-size: .84rem;
    }

    .word-block {
      text-align: center;
      margin: 26px 0 18px;
    }

    .word {
      display: inline-block;
      font-family: var(--serif);
      font-size: clamp(2.6rem, 6vw, 4.1rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      padding-bottom: 12px;
      border-bottom: 2px dashed rgba(16, 25, 41, .24);
    }

    .pronunciation {
      display: inline-grid;
      width: 46px;
      height: 46px;
      place-items: center;
      margin-top: 18px;
      border: 1px solid rgba(16, 25, 41, .18);
      border-radius: 50%;
      background: rgba(255, 255, 255, .5);
      color: #2d3b4c;
    }

    .prompt {
      margin: 0 0 18px;
      text-align: center;
      color: #333c4b;
      font-weight: 800;
    }

    .answers {
      display: grid;
      gap: 12px;
    }

    .answer {
      width: 100%;
      min-height: 56px;
      border: 1px solid rgba(16, 25, 41, .18);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .55);
      color: #152132;
      cursor: pointer;
      font-weight: 800;
      padding: 11px 16px;
      transition: transform .16s ease, border-color .16s ease, background .16s ease, color .16s ease;
      overflow-wrap: anywhere;
    }

    .answer:hover,
    .answer:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(33, 139, 84, .7);
      outline: none;
      background: rgba(255, 255, 255, .82);
    }

    .answer.correct {
      border-color: #2c9a5b;
      color: #146739;
      background: #eefbf0;
    }

    .answer.wrong {
      border-color: #c95a50;
      color: #99372f;
      background: #fff1ef;
    }

    .answer:disabled {
      cursor: default;
      opacity: .82;
      transform: none;
    }

    .feedback {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 74px;
      margin-top: 22px;
      padding: 14px 16px;
      border: 1px solid #b9dfc4;
      border-radius: var(--radius);
      color: #176638;
      background: #eefaf0;
    }

    .feedback.bad {
      border-color: #f0c5bc;
      color: #8a362e;
      background: #fff1ed;
    }

    .feedback-icon {
      display: grid;
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      place-items: center;
      border: 2px solid currentColor;
      border-radius: 50%;
      font-weight: 900;
    }

    .feedback-copy {
      flex: 1 1 auto;
      min-width: 0;
    }

    .feedback-copy strong,
    .feedback-copy span {
      display: block;
    }

    .feedback-copy span {
      margin-top: 4px;
      font-size: .92rem;
    }

    .reward {
      color: #12763d;
      font-size: 1.25rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .quiz-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .primary-button {
      border: 0;
      background: linear-gradient(180deg, #ffc85c, #efaa32);
      color: #161410;
      padding: 0 20px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(213, 139, 32, .24);
    }

    .primary-button:hover,
    .primary-button:focus-visible {
      transform: translateY(-1px);
      outline: none;
      background: linear-gradient(180deg, #ffd375, #f0b13f);
    }

    .primary-button:disabled,
    .ghost-button:disabled {
      cursor: not-allowed;
      opacity: .55;
      transform: none;
    }

    .tip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #b9aa91;
      margin: 18px 0 0;
      font-size: .92rem;
      text-align: center;
    }

    .shop-tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #101d2d;
      color: #d4c4ab;
      cursor: pointer;
      font-weight: 800;
      transition: background .18s ease, color .18s ease, border-color .18s ease;
    }

    .tab.active,
    .tab:hover,
    .tab:focus-visible {
      border-color: rgba(245, 184, 75, .7);
      background: linear-gradient(180deg, #ffc85c, #eead3d);
      color: #14110b;
      outline: none;
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .shop-card {
      position: relative;
      display: grid;
      min-height: 222px;
      overflow: hidden;
      border: 1px solid #314254;
      border-radius: var(--radius);
      background: #0c1724;
      color: inherit;
    }

    .shop-art {
      display: grid;
      place-items: center;
      height: 104px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      background:
        linear-gradient(135deg, rgba(245, 184, 75, .24), rgba(88, 198, 180, .08)),
        #151f2e;
      font-size: 3rem;
    }

    .shop-info {
      display: grid;
      gap: 6px;
      padding: 12px;
    }

    .shop-info h3 {
      margin: 0;
      font-size: 1rem;
      color: #fff1d8;
    }

    .shop-info p {
      margin: 0;
      color: #b7c0cb;
      font-size: .86rem;
      line-height: 1.35;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 4px;
    }

    .price {
      color: var(--gold);
      font-size: 1.22rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .buy {
      min-height: 34px;
      border: 1px solid rgba(245, 184, 75, .5);
      border-radius: var(--radius);
      background: rgba(245, 184, 75, .10);
      color: #ffd98c;
      padding: 0 12px;
      cursor: pointer;
      font-weight: 900;
      transition: background .18s ease, color .18s ease, opacity .18s ease;
      white-space: nowrap;
    }

    .buy:hover,
    .buy:focus-visible {
      background: var(--gold);
      color: #14110b;
      outline: none;
    }

    .buy:disabled {
      cursor: default;
      color: #b4bdc8;
      border-color: rgba(255, 255, 255, .18);
      background: rgba(255, 255, 255, .07);
      opacity: .72;
    }

    .owned {
      position: absolute;
      top: 8px;
      right: 8px;
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 0 10px;
      background: rgba(36, 117, 78, .92);
      color: #dfffea;
      font-size: .78rem;
      font-weight: 900;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 10;
      max-width: min(380px, calc(100vw - 44px));
      padding: 14px 16px;
      border: 1px solid rgba(245, 184, 75, .5);
      border-radius: var(--radius);
      background: rgba(11, 23, 36, .96);
      box-shadow: var(--shadow);
      color: #ffe6b3;
      transform: translateY(22px);
      opacity: 0;
      pointer-events: none;
      transition: transform .2s ease, opacity .2s ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 1180px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }

      .asset-panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 20px, 620px);
        padding-top: 16px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
      }

      .tagline {
        white-space: normal;
      }

      .top-actions {
        width: 100%;
        justify-content: space-between;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .panel-pad,
      .quiz-panel {
        padding: 16px;
      }

      .balance-row,
      .feedback,
      .progress-row {
        align-items: stretch;
        flex-direction: column;
      }

      .progress-row {
        gap: 10px;
      }

      .progress-track {
        width: 100%;
        flex-basis: 7px;
      }

      .stats {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .stat,
      .stat + .stat {
        border-left: 0;
        padding: 0;
      }

      .card {
        min-height: 0;
        padding: 20px;
      }

      .word-block {
        margin-top: 18px;
      }

      .quiz-actions {
        grid-template-columns: 1fr;
      }

      .shop-tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .shop-grid {
        grid-template-columns: 1fr;
      }

      .transaction {
        grid-template-columns: 34px minmax(0, 1fr);
      }

      .transaction-amount {
        grid-column: 2;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar" aria-label="应用顶部栏">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M4 9h16M6 9v9M10 9v9M14 9v9M18 9v9M3 19h18M12 3l8 4H4l8-4Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1>德语返钱局</h1>
      </div>
      <div class="tagline">
        <span aria-hidden="true">☾</span>
        <strong>深夜学习，悄悄返现。</strong>
      </div>
      <div class="top-actions" aria-label="快捷操作">
        <button class="icon-button" id="resetButton" type="button" title="重置 demo 数据" aria-label="重置 demo 数据">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M4 5v5h5M5.5 14a7 7 0 1 0 1.7-7.2L4 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="icon-button" type="button" title="学习统计" aria-label="学习统计">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M4 19V5M4 19h16M8 16v-5M12 16V8M16 16v-8M20 16v-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-button" type="button" title="设置" aria-label="设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" stroke="currentColor" stroke-width="2"/>
            <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.06.06a2 2 0 1 1-2.82 2.82l-.06-.06A1.8 1.8 0 0 0 15 19.44a1.8 1.8 0 0 0-1 .56l-.1.1a2 2 0 1 1-3.8 0L10 20a1.8 1.8 0 0 0-1-.56 1.8 1.8 0 0 0-1.94.36l-.06.06a2 2 0 1 1-2.82-2.82l.06-.06A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-.56-1l-.1-.1a2 2 0 1 1 0-3.8l.1-.1a1.8 1.8 0 0 0 .56-1 1.8 1.8 0 0 0-.36-1.94l-.06-.06a2 2 0 1 1 2.82-2.82l.06.06A1.8 1.8 0 0 0 9 4.6c.36-.16.7-.35 1-.56l.1-.1a2 2 0 1 1 3.8 0l.1.1c.3.21.64.4 1 .56a1.8 1.8 0 0 0 1.94-.36l.06-.06a2 2 0 1 1 2.82 2.82l-.06.06A1.8 1.8 0 0 0 19.4 9c.16.36.35.7.56 1l.1.1a2 2 0 1 1 0 3.8l-.1.1c-.21.3-.4.64-.56 1Z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="grid">
      <aside class="panel panel-pad asset-panel" aria-labelledby="assetTitle">
        <div class="panel-head">
          <h2 class="panel-title" id="assetTitle">我的资产</h2>
        </div>

        <p class="balance-label">当前余额</p>
        <div class="balance-row">
          <div>
            <div class="balance" id="balance">€0.00</div>
            <div class="currency-note">虚拟金额，只在这个小世界里生效</div>
          </div>
          <div class="wallet" aria-hidden="true">
            <svg width="27" height="27" viewBox="0 0 24 24" fill="none">
              <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5H18a2 2 0 0 1 2 2v2H7a3 3 0 0 0 0 6h13v2a2 2 0 0 1-2 2H6.5A2.5 2.5 0 0 1 4 16.5v-9Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M17 12h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <div class="stats" aria-label="学习统计">
          <div class="stat">
            <div class="stat-label"><span aria-hidden="true">🔥</span> 连续学习</div>
            <strong id="streak">0</strong><span>题</span>
          </div>
          <div class="stat">
            <div class="stat-label"><span aria-hidden="true">📖</span> 已答题</div>
            <strong id="answered">0</strong><span>题</span>
          </div>
        </div>

        <div class="panel-head" style="margin-top: 22px;">
          <h2 class="panel-title">近期收支</h2>
          <button class="link-button" id="clearTransactions" type="button">清空记录 →</button>
        </div>
        <div class="transactions" id="transactions" aria-live="polite"></div>
      </aside>

      <section class="panel quiz-panel" aria-labelledby="quizTitle">
        <div class="progress-row">
          <div class="progress-copy" id="quizTitle">今日学习进度 <strong id="progressText">0 / 12 题</strong></div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <button class="ghost-button" id="skipButton" type="button">换一题 ↻</button>
        </div>

        <article class="card">
          <div>
            <span class="level-pill" id="level">A1</span>
            <span class="card-id" id="cardId">ID: 0000</span>
            <div class="word-block">
              <div class="word" id="word">lernen</div>
              <button class="pronunciation" id="speakButton" type="button" title="朗读德语词" aria-label="朗读德语词">
                <svg width="21" height="21" viewBox="0 0 24 24" fill="none">
                  <path d="M5 9v6h4l5 4V5L9 9H5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M17 9.5a4 4 0 0 1 0 5M19.5 7a7.5 7.5 0 0 1 0 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
            <p class="prompt">请选择正确的中文释义</p>
            <div class="answers" id="answers"></div>
          </div>

          <div>
            <div class="feedback" id="feedback" aria-live="polite">
              <div class="feedback-icon" id="feedbackIcon">€</div>
              <div class="feedback-copy">
                <strong id="feedbackTitle">答对一题，给自己返钱。</strong>
                <span id="feedbackText">每题基础奖励 €0.50，连续答对 3 题开始有加成。</span>
              </div>
              <div class="reward" id="rewardText">+ €0.00</div>
            </div>
            <div class="quiz-actions">
              <button class="ghost-button" id="markButton" type="button">不太熟悉</button>
              <button class="primary-button" id="nextButton" type="button" disabled>下一题 →</button>
            </div>
          </div>
        </article>

        <p class="tip"><span aria-hidden="true">💡</span> 小贴士：多读多练，语言会悄悄进步。</p>
      </section>

      <section class="panel panel-pad" aria-labelledby="shopTitle">
        <div class="panel-head">
          <h2 class="panel-title" id="shopTitle">虚拟商店</h2>
          <button class="link-button" id="ordersButton" type="button">我的订单 →</button>
        </div>
        <div class="shop-tabs" role="tablist" aria-label="商品分类">
          <button class="tab active" type="button" data-filter="all">全部</button>
          <button class="tab" type="button" data-filter="drink">饮品</button>
          <button class="tab" type="button" data-filter="snack">甜点</button>
          <button class="tab" type="button" data-filter="experience">体验</button>
        </div>
        <div class="shop-grid" id="shopGrid"></div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORE_KEY = "germanCashbackDemo.v1";
    const DAILY_GOAL = 12;
    const BASE_REWARD = 0.5;

    const words = [
      { id: 2387, level: "A2", word: "vorstellen", answer: "介绍；推荐", options: ["介绍；推荐", "忘记；遗忘", "准备；准备好", "代表；参加"] },
      { id: 1942, level: "A1", word: "der Kaffee", answer: "咖啡", options: ["咖啡", "火车站", "雨伞", "账单"] },
      { id: 2048, level: "A1", word: "lernen", answer: "学习", options: ["旅行", "学习", "等待", "购买"] },
      { id: 3150, level: "A2", word: "die Gelegenheit", answer: "机会", options: ["机会", "速度", "城市", "习惯"] },
      { id: 4501, level: "A1", word: "bezahlen", answer: "付款", options: ["付款", "睡觉", "打开", "唱歌"] },
      { id: 5508, level: "A2", word: "sich erinnern", answer: "记得；回忆", options: ["记得；回忆", "丢失", "相信", "借出"] },
      { id: 6024, level: "B1", word: "die Veränderung", answer: "变化", options: ["变化", "借口", "菜单", "邻居"] },
      { id: 6391, level: "A1", word: "müde", answer: "疲惫的", options: ["疲惫的", "昂贵的", "圆形的", "安静的"] },
      { id: 7114, level: "A2", word: "ausgeben", answer: "花费；支出", options: ["花费；支出", "上交", "搬家", "照顾"] },
      { id: 7730, level: "A2", word: "die Belohnung", answer: "奖励", options: ["奖励", "风险", "报纸", "路线"] },
      { id: 8119, level: "A1", word: "heute Abend", answer: "今晚", options: ["今晚", "上周", "明年", "立刻"] },
      { id: 8582, level: "B1", word: "durchhalten", answer: "坚持下去", options: ["坚持下去", "关上", "比较", "邀请"] },
      { id: 9017, level: "A2", word: "die Rechnung", answer: "账单", options: ["账单", "护照", "键盘", "森林"] },
      { id: 9640, level: "A1", word: "genießen", answer: "享受", options: ["享受", "忘记", "修理", "相信"] },
      { id: 1002, level: "B1", word: "sich lohnen", answer: "值得", options: ["值得", "迟到", "交换", "着陆"] },
      { id: 1156, level: "A2", word: "der Wunsch", answer: "愿望", options: ["愿望", "证据", "声音", "压力"] }
    ];

    const shopItems = [
      { id: "latte", category: "drink", icon: "☕", name: "拿铁咖啡", desc: "提神醒脑，继续学习", price: 2.8 },
      { id: "cake", category: "snack", icon: "🍰", name: "黑森林蛋糕", desc: "奖励自己一下", price: 3.6 },
      { id: "notebook", category: "stationery", icon: "📓", name: "德语笔记本套装", desc: "好记性不如烂笔头", price: 4.9 },
      { id: "pen", category: "stationery", icon: "🖊️", name: "简约中性笔", desc: "书写每一个单词", price: 1.5 },
      { id: "berlin-night", category: "experience", icon: "🌃", name: "柏林夜游体验票", desc: "感受柏林的夜晚", price: 18 },
      { id: "fridge", category: "experience", icon: "🧲", name: "柏林冰箱贴", desc: "把回忆贴在生活里", price: 4.5 }
    ];

    const defaultState = {
      balance: 0,
      streak: 0,
      answered: 0,
      purchases: [],
      transactions: []
    };

    let state = loadState();
    let currentIndex = 0;
    let answeredThisCard = false;
    let activeFilter = "all";

    const el = {
      balance: document.querySelector("#balance"),
      streak: document.querySelector("#streak"),
      answered: document.querySelector("#answered"),
      progressText: document.querySelector("#progressText"),
      progressBar: document.querySelector("#progressBar"),
      level: document.querySelector("#level"),
      cardId: document.querySelector("#cardId"),
      word: document.querySelector("#word"),
      answers: document.querySelector("#answers"),
      feedback: document.querySelector("#feedback"),
      feedbackIcon: document.querySelector("#feedbackIcon"),
      feedbackTitle: document.querySelector("#feedbackTitle"),
      feedbackText: document.querySelector("#feedbackText"),
      rewardText: document.querySelector("#rewardText"),
      nextButton: document.querySelector("#nextButton"),
      skipButton: document.querySelector("#skipButton"),
      markButton: document.querySelector("#markButton"),
      speakButton: document.querySelector("#speakButton"),
      shopGrid: document.querySelector("#shopGrid"),
      transactions: document.querySelector("#transactions"),
      toast: document.querySelector("#toast"),
      clearTransactions: document.querySelector("#clearTransactions"),
      resetButton: document.querySelector("#resetButton"),
      ordersButton: document.querySelector("#ordersButton")
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) return { ...defaultState };
        const parsed = JSON.parse(raw);
        return {
          ...defaultState,
          ...parsed,
          purchases: Array.isArray(parsed.purchases) ? parsed.purchases : [],
          transactions: Array.isArray(parsed.transactions) ? parsed.transactions : []
        };
      } catch {
        return { ...defaultState };
      }
    }

    function saveState() {
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }

    function formatMoney(value) {
      return `€${Number(value).toFixed(2)}`;
    }

    function signedMoney(value) {
      const sign = value >= 0 ? "+" : "-";
      return `${sign} ${formatMoney(Math.abs(value))}`;
    }

    function addTransaction(type, label, amount) {
      state.transactions.unshift({
        type,
        label,
        amount,
        time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })
      });
      state.transactions = state.transactions.slice(0, 6);
    }

    function shuffle(list) {
      return [...list].sort(() => Math.random() - 0.5);
    }

    function currentCard() {
      return words[currentIndex % words.length];
    }

    function getReward() {
      const streakBonus = state.streak >= 3 ? Math.min(0.9, Math.floor(state.streak / 3) * 0.2) : 0;
      return Number((BASE_REWARD + streakBonus).toFixed(2));
    }

    function render() {
      el.balance.textContent = formatMoney(state.balance);
      el.streak.textContent = state.streak;
      el.answered.textContent = state.answered;
      const progress = Math.min(state.answered % DAILY_GOAL, DAILY_GOAL);
      el.progressText.textContent = `${progress} / ${DAILY_GOAL} 题`;
      el.progressBar.style.width = `${(progress / DAILY_GOAL) * 100}%`;
      renderTransactions();
      renderShop();
    }

    function renderCard() {
      answeredThisCard = false;
      const card = currentCard();
      el.level.textContent = card.level;
      el.cardId.textContent = `ID: ${card.id}`;
      el.word.textContent = card.word;
      el.answers.innerHTML = "";
      shuffle(card.options).forEach(option => {
        const button = document.createElement("button");
        button.className = "answer";
        button.type = "button";
        button.textContent = option;
        button.addEventListener("click", () => answerCard(option, button));
        el.answers.appendChild(button);
      });
      el.nextButton.disabled = true;
      setFeedback("idle");
    }

    function setFeedback(kind, detail = {}) {
      el.feedback.classList.toggle("bad", kind === "bad");
      if (kind === "good") {
        el.feedbackIcon.textContent = "✓";
        el.feedbackTitle.textContent = "太棒了！回答正确";
        el.feedbackText.textContent = detail.bonus > 0
          ? `基础奖励 €0.50，连续答对加成 ${formatMoney(detail.bonus)} 已存入账户。`
          : "奖励 €0.50 已存入账户。";
        el.rewardText.textContent = signedMoney(detail.reward);
      } else if (kind === "bad") {
        el.feedbackIcon.textContent = "×";
        el.feedbackTitle.textContent = "这题先记进错题感";
        el.feedbackText.textContent = `正确答案：${detail.answer}`;
        el.rewardText.textContent = "+ €0.00";
      } else if (kind === "mark") {
        el.feedbackIcon.textContent = "!";
        el.feedbackTitle.textContent = "已标记：不太熟悉";
        el.feedbackText.textContent = "这题没有扣钱，下一轮再把它赚回来。";
        el.rewardText.textContent = "+ €0.00";
      } else {
        el.feedbackIcon.textContent = "€";
        el.feedbackTitle.textContent = "答对一题，给自己返钱。";
        el.feedbackText.textContent = "每题基础奖励 €0.50，连续答对 3 题开始有加成。";
        el.rewardText.textContent = "+ €0.00";
      }
    }

    function answerCard(option, button) {
      if (answeredThisCard) return;
      answeredThisCard = true;
      const card = currentCard();
      const buttons = [...el.answers.querySelectorAll(".answer")];
      buttons.forEach(item => {
        item.disabled = true;
        if (item.textContent === card.answer) item.classList.add("correct");
      });

      state.answered += 1;

      if (option === card.answer) {
        const previousReward = BASE_REWARD;
        state.streak += 1;
        const reward = getReward();
        state.balance = Number((state.balance + reward).toFixed(2));
        addTransaction("earn", `答对题目奖励：${card.word}`, reward);
        setFeedback("good", { reward, bonus: Number((reward - previousReward).toFixed(2)) });
        showToast(`收入 ${formatMoney(reward)}：${card.word}`);
      } else {
        button.classList.add("wrong");
        state.streak = 0;
        setFeedback("bad", { answer: card.answer });
      }

      el.nextButton.disabled = false;
      saveState();
      render();
    }

    function nextCard() {
      currentIndex = (currentIndex + 1) % words.length;
      renderCard();
    }

    function markUnfamiliar() {
      if (answeredThisCard) return;
      answeredThisCard = true;
      state.streak = 0;
      state.answered += 1;
      [...el.answers.querySelectorAll(".answer")].forEach(button => button.disabled = true);
      setFeedback("mark");
      el.nextButton.disabled = false;
      saveState();
      render();
    }

    function renderTransactions() {
      if (!state.transactions.length) {
        el.transactions.innerHTML = `
          <div class="transaction">
            <div class="transaction-icon">€</div>
            <div class="transaction-name">
              <strong>还没有收支记录</strong>
              <span>先答对一题，让余额动起来</span>
            </div>
            <div class="transaction-amount">€0.00</div>
          </div>
        `;
        return;
      }
      el.transactions.innerHTML = state.transactions.map(item => `
        <div class="transaction ${item.type === "spend" ? "spend" : ""}">
          <div class="transaction-icon">${item.type === "spend" ? "🛒" : "✓"}</div>
          <div class="transaction-name">
            <strong>${item.type === "spend" ? "购买" : "收入"}</strong>
            <span>${item.label} · ${item.time}</span>
          </div>
          <div class="transaction-amount">${signedMoney(item.amount)}</div>
        </div>
      `).join("");
    }

    function renderShop() {
      const visibleItems = shopItems.filter(item => activeFilter === "all" || item.category === activeFilter);
      el.shopGrid.innerHTML = visibleItems.map(item => {
        const owned = state.purchases.includes(item.id);
        const affordable = state.balance >= item.price;
        return `
          <article class="shop-card">
            <div class="owned">${owned ? "已拥有" : "未拥有"}</div>
            <div class="shop-art" aria-hidden="true">${item.icon}</div>
            <div class="shop-info">
              <h3>${item.name}</h3>
              <p>${item.desc}</p>
              <div class="price-row">
                <span class="price">${formatMoney(item.price)}</span>
                <button class="buy" type="button" data-buy="${item.id}" ${owned || !affordable ? "disabled" : ""}>
                  ${owned ? "已购买" : affordable ? "购买" : "余额不足"}
                </button>
              </div>
            </div>
          </article>
        `;
      }).join("");

      el.shopGrid.querySelectorAll("[data-buy]").forEach(button => {
        button.addEventListener("click", () => buyItem(button.dataset.buy));
      });
    }

    function buyItem(itemId) {
      const item = shopItems.find(product => product.id === itemId);
      if (!item || state.purchases.includes(itemId)) return;
      if (state.balance < item.price) {
        showToast(`还差 ${formatMoney(item.price - state.balance)}，再答几题就能买。`);
        return;
      }

      state.balance = Number((state.balance - item.price).toFixed(2));
      state.purchases.push(item.id);
      addTransaction("spend", item.name, -item.price);
      saveState();
      render();
      showToast(`已购买：${item.name}，这份快感归学习所有。`);
    }

    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => el.toast.classList.remove("show"), 2300);
    }

    function speakCurrentWord() {
      if (!("speechSynthesis" in window)) {
        showToast("当前浏览器不支持朗读。");
        return;
      }
      const utterance = new SpeechSynthesisUtterance(currentCard().word);
      utterance.lang = "de-DE";
      utterance.rate = 0.82;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(item => item.classList.remove("active"));
        tab.classList.add("active");
        activeFilter = tab.dataset.filter;
        renderShop();
      });
    });

    el.nextButton.addEventListener("click", nextCard);
    el.skipButton.addEventListener("click", nextCard);
    el.markButton.addEventListener("click", markUnfamiliar);
    el.speakButton.addEventListener("click", speakCurrentWord);
    el.clearTransactions.addEventListener("click", () => {
      state.transactions = [];
      saveState();
      renderTransactions();
      showToast("近期收支已清空。");
    });
    el.ordersButton.addEventListener("click", () => {
      const names = state.purchases
        .map(id => shopItems.find(item => item.id === id)?.name)
        .filter(Boolean);
      showToast(names.length ? `已拥有：${names.join("、")}` : "还没有订单，先去赚第一杯咖啡。");
    });
    el.resetButton.addEventListener("click", () => {
      state = { ...defaultState, purchases: [], transactions: [] };
      saveState();
      render();
      renderCard();
      showToast("Demo 数据已重置。");
    });

    render();
    renderCard();
  </script>
</body>
</html>
